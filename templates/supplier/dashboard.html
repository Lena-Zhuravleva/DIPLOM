{% extends "layouts/app.html" %}
{% block title %}Поставщик{% endblock %}

{% block content %}
<div class="card">
  <div class="card-header">
      <h2><i class="fas fa-truck-loading"></i> Запись на разгрузку</h2>
  </div>

  <div class="row">
    <div class="col col-6">
      <label class="form-label">Материал</label>
      <select class="form-control" id="mat">
        {% for m in materials %}
          <option value="{{ m.id }}">{{ m.name }} ({{ m.unit }})</option>
        {% endfor %}
      </select>
    </div>

    <div class="col col-6">
      <label class="form-label">Количество</label>
      <input class="form-control" id="qty" type="number" min="1" value="1">
    </div>
  </div>

  <div class="row mt-2">
    <div class="col col-6">
      <label class="form-label">Дата</label>
      <input class="form-control" id="date" type="date">
    </div>
    <div class="col col-6">
      <label class="form-label">Время</label>
      <input class="form-control" id="time" type="time" value="08:00">
    </div>
  </div>

  <div class="row mt-2">
    <div class="col col-6">
      <label class="form-label">Место выгрузки</label>
      <select class="form-control" id="place">
        <option value="RAW_1">RAW_1</option>
        <option value="RAW_2">RAW_2</option>
        <option value="RAW_3">RAW_3</option>
        <option value="CRANE">CRANE</option>
      </select>
    </div>
    <div class="col col-6">
      <label class="form-label">Длительность (мин)</label>
      <input class="form-control" id="dur" type="number" min="5" step="5" value="15">
    </div>
  </div>

  <div class="mt-2">
    <label class="form-label">Комментарий</label>
    <textarea class="form-control" id="notes" rows="3"></textarea>
  </div>

  <div class="mt-3">
    <button class="btn btn-primary" id="send">
      <i class="fas fa-paper-plane"></i> Отправить заявку
    </button>
  </div>
</div>

<script>
document.getElementById('send').addEventListener('click', async () => {
  const payload = {
    material_id: document.getElementById('mat').value,
    quantity: document.getElementById('qty').value,
    requested_date: document.getElementById('date').value,
    requested_time_slot: document.getElementById('time').value,
    unload_place: document.getElementById('place').value,
    duration_min: document.getElementById('dur').value,
    notes: document.getElementById('notes').value
  };

  if(!payload.requested_date){
    alert('Выбери дату');
    return;
  }

  const r = await fetch('/api/supplier/book', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  });
  const j = await r.json();
  if(j.success){
    alert('Заявка отправлена логисту');
  }else{
    alert(j.error || 'Ошибка отправки');
  }
});
</script>
{% endblock %}
