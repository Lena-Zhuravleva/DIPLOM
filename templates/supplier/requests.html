{% extends "layouts/app.html" %}
{% block title %}Мои заявки{% endblock %}

{% block content %}
<div class="card">
  <div class="card-header">
    <h2><i class="fas fa-clipboard-list"></i> Мои заявки</h2>
  </div>

  <div class="table-responsive">
    <table class="data-table" id="tbl">
      <thead>
        <tr>
          <th>ID</th>
          <th>Материал</th>
          <th>Кол-во</th>
          <th>Дата</th>
          <th>Время</th>
          <th>Место</th>
          <th>Длительность</th>
          <th>Комментарий</th>
          <th>Статус</th>
          <th>Действия</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div class="card mt-3">
  <div class="card-header">
    <h3><i class="fas fa-calendar-alt"></i> Выбор времени</h3>
  </div>

  <div class="row">
    <div class="col col-6">
      <label class="form-label">Дата</label>
      <input class="form-control" id="calendarDate" type="date">
    </div>
    <div class="col col-6">
      <label class="form-label">Длительность</label>
      <select class="form-control" id="duration">
        <option value="15">15 мин</option>
        <option value="30">30 мин</option>
        <option value="45">45 мин</option>
        <option value="60">60 мин</option>
        <option value="90">90 мин</option>
        <option value="120">120 мин</option>
      </select>
    </div>
  </div>

  <div class="table-responsive mt-2">
    <table class="data-table" id="calendarTable">
      <thead id="calendarThead"></thead>
      <tbody id="calendarTbody">
        <tr><td>Выберите заявку</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
let activeRequestId = null;

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/[&<>"']/g, (m) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[m]);
}

async function loadRequests() {
  const r = await fetch('/api/supplier/requests');
  const j = await r.json();
  const tb = document.querySelector('#tbl tbody');
  tb.innerHTML = '';

  if (!j.success) {
    tb.innerHTML = `<tr><td colspan="10">${j.error || 'Ошибка'}</td></tr>`;
    return;
  }

  if (j.items.length === 0) {
    tb.innerHTML = `<tr><td colspan="10">Заявок пока нет</td></tr>`;
    return;
  }

  for (const it of j.items) {
    let actions = '—';

    if (it.status === 'pending_supplier' || it.status === 'reschedule_requested') {
      actions = `
        <div class="action-stack">
          <button type="button" class="btn btn-success btn-sm" onclick="acceptRequest(${it.id})">Принять</button>
          <button type="button" class="btn btn-primary btn-sm" onclick="selectRequest(${it.id}, '${it.requested_date || ''}')">Другое время</button>
          <button type="button" class="btn btn-danger btn-sm" onclick="rejectRequest(${it.id})">Отказ</button>
        </div>
      `;
    }

    tb.insertAdjacentHTML('beforeend', `
      <tr class="${activeRequestId === it.id ? 'active-row' : ''}">
        <td>${it.id}</td>
        <td>${escapeHtml(it.material || '—')}</td>
        <td>${escapeHtml(it.quantity || '—')}</td>
        <td>${escapeHtml(it.requested_date || '—')}</td>
        <td>${escapeHtml(it.requested_time_slot || '—')}</td>
        <td>${escapeHtml(it.unload_place || '—')}</td>
        <td>${escapeHtml(it.duration_min || '—')} мин</td>
        <td>${escapeHtml(it.notes || '—')}</td>
        <td>${escapeHtml(it.status)}</td>
        <td>${actions}</td>
      </tr>
    `);
  }
}

async function selectRequest(reqId, reqDate) {
  activeRequestId = reqId;

  const dateInput = document.getElementById('calendarDate');

  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const max = new Date(today);
  max.setDate(today.getDate() + 7);

  let selectedDate = today.toISOString().slice(0, 10);

  if (reqDate) {
    const req = new Date(reqDate);
    req.setHours(0, 0, 0, 0);

    if (req >= today && req <= max) {
      selectedDate = reqDate;
    }
  }

  dateInput.value = selectedDate;

  await loadRequests();
  await loadCalendar(selectedDate);
}

async function loadCalendar(dateStr) {
  const thead = document.getElementById('calendarThead');
  const tbody = document.getElementById('calendarTbody');

  thead.innerHTML = '';
  tbody.innerHTML = `<tr><td>Загрузка…</td></tr>`;

  const r = await fetch(`/api/supplier/calendar?date=${dateStr}`);
  const j = await r.json();

  if (!j.success) {
    tbody.innerHTML = `<tr><td>${j.error || 'Ошибка'}</td></tr>`;
    return;
  }

  thead.innerHTML = `
    <tr>
      <th>Время</th>
      ${j.places.map(p => `<th>${escapeHtml(p.title)}</th>`).join('')}
    </tr>
  `;

  tbody.innerHTML = j.rows.map(row => {
    const cells = j.places.map(p => {
      const cell = row.cells[p.id];
      const status = cell?.status || 'free';
      const label = cell?.label || 'Свободно';

      let cls = 'free';
      if (status === 'busy') cls = 'busy';
      if (status === 'pending') cls = 'pending';

      let btn = '';
      if (status === 'free' && activeRequestId !== null) {
        btn = `<button class="btn btn-primary btn-sm" onclick="confirmSlot('${row.time}', '${p.id}')">Выбрать</button>`;
      }

      return `
        <td class="${cls}">
          <div>${escapeHtml(label)}</div>
          ${btn}
        </td>
      `;
    }).join('');

    return `
      <tr>
        <td>${escapeHtml(row.time)}</td>
        ${cells}
      </tr>
    `;
  }).join('');
}

async function confirmSlot(time, place) {
  if (activeRequestId === null) {
    alert('Сначала выберите заявку');
    return;
  }

  const date = document.getElementById('calendarDate').value;
  if (!date) {
    alert('Выберите дату');
    return;
  }

  const duration = document.getElementById('duration').value;

  const r = await fetch(`/api/supplier/requests/${activeRequestId}/confirm`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      delivery_date: date,
      delivery_time: time,
      unload_place: place,
      duration_min: duration
    })
  });

  let j;
  try {
    j = await r.json();
  } catch (e) {
    alert('Ошибка сервера: ответ не в формате JSON');
    return;
  }

  if (!r.ok) {
    alert(j.error || 'Ошибка подтверждения');
    return;
  }

  if (j.success) {
    alert('Время подтверждено');
    activeRequestId = null;
    await loadRequests();

    document.getElementById('calendarThead').innerHTML = '';
    document.getElementById('calendarTbody').innerHTML =
      `<tr><td>Выберите заявку</td></tr>`;
  } else {
    alert(j.error || 'Ошибка подтверждения');
  }
}

async function rejectRequest(reqId) {
  const ok = confirm('Отказаться от заявки?');
  if (!ok) return;

  const r = await fetch(`/api/supplier/requests/${reqId}/reject`, {
    method: 'POST'
  });
  const j = await r.json();

  if (j.success) {
    alert('Заявка отклонена');
    await loadRequests();
  } else {
    alert(j.error || 'Ошибка');
  }
}

document.getElementById('calendarDate').addEventListener('change', async (e) => {
  if (e.target.value) {
    await loadCalendar(e.target.value);
  }
});

async function acceptRequest(reqId) {
  const r = await fetch(`/api/supplier/requests/${reqId}/accept`, {
    method: 'POST'
  });

  const j = await r.json();

  if (j.success) {
    alert('Заявка принята');
    await loadRequests();
  } else {
    alert(j.error || 'Ошибка');
  }
}

loadRequests();

const dateInput = document.getElementById('calendarDate');

const today = new Date();
const max = new Date();
max.setDate(today.getDate() + 7);

dateInput.min = today.toISOString().slice(0, 10);
dateInput.max = max.toISOString().slice(0, 10);
</script>
{% endblock %}
