{% extends "layouts/app.html" %}
{% block title %}Мои заявки{% endblock %}

{% block content %}
<div class="card">
  <div class="card-header">
    <h2><i class="fas fa-clipboard-list"></i> Мои заявки</h2>
  </div>

  <div class="table-responsive">
    <table class="data-table" id="tbl">
      <thead>
        <tr>
          <th>ID</th>
          <th>Материал</th>
          <th>Кол-во</th>
          <th>Дата</th>
          <th>Время</th>
          <th>Место</th>
          <th>Статус</th>
          <th>Действия</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div class="card mt-3">
  <div class="card-header">
    <h3><i class="fas fa-calendar-alt"></i> Выбор времени</h3>
  </div>

  <div class="row">
    <div class="col col-6">
      <label class="form-label">Дата</label>
      <input class="form-control" id="calendarDate" type="date">
    </div>
  </div>

  <div class="table-responsive mt-2">
    <table class="data-table" id="calendarTable">
      <thead id="calendarThead"></thead>
      <tbody id="calendarTbody">
        <tr><td>Выберите заявку</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
let activeRequestId = null;
let activeRequestStatus = null;

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/[&<>"']/g, (m) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[m]);
}

async function loadRequests() {
  const r = await fetch('/api/supplier/requests');
  const j = await r.json();
  const tb = document.querySelector('#tbl tbody');
  tb.innerHTML = '';

  if (!j.success) {
    tb.innerHTML = `<tr><td colspan="8">${j.error || 'Ошибка'}</td></tr>`;
    return;
  }

  if (j.items.length === 0) {
    tb.innerHTML = `<tr><td colspan="8">Заявок пока нет</td></tr>`;
    return;
  }

  for (const it of j.items) {
    let actions = '—';

    if (it.status === 'pending_supplier') {
      actions = `
        <button class="btn btn-primary btn-sm" onclick="selectRequest(${it.id}, '${it.requested_date || ''}')">Выбрать время</button>
        <button class="btn btn-secondary btn-sm" onclick="rescheduleRequest(${it.id})">Перенос</button>
        <button class="btn btn-danger btn-sm" onclick="rejectRequest(${it.id})">Отказ</button>
      `;
    }

    tb.insertAdjacentHTML('beforeend', `
      <tr>
        <td>${it.id}</td>
        <td>${escapeHtml(it.material || '—')}</td>
        <td>${escapeHtml(it.quantity || '—')}</td>
        <td>${escapeHtml(it.requested_date || '—')}</td>
        <td>${escapeHtml(it.requested_time_slot || '—')}</td>
        <td>${escapeHtml(it.unload_place || '—')}</td>
        <td>${escapeHtml(it.status)}</td>
        <td>${actions}</td>
      </tr>
    `);
  }
}

async function selectRequest(reqId, reqDate) {
  activeRequestId = reqId;
  activeRequestStatus = 'pending_supplier';

  const dateInput = document.getElementById('calendarDate');
  if (reqDate) {
    dateInput.value = reqDate;
  } else {
    dateInput.value = new Date().toISOString().slice(0, 10);
  }

  await loadCalendar(dateInput.value);
}

async function loadCalendar(dateStr) {
  const thead = document.getElementById('calendarThead');
  const tbody = document.getElementById('calendarTbody');

  thead.innerHTML = '';
  tbody.innerHTML = `<tr><td>Загрузка…</td></tr>`;

  const r = await fetch(`/api/supplier/calendar?date=${dateStr}`);
  const j = await r.json();

  if (!j.success) {
    tbody.innerHTML = `<tr><td>${j.error || 'Ошибка'}</td></tr>`;
    return;
  }

  thead.innerHTML = `
    <tr>
      <th>Время</th>
      ${j.places.map(p => `<th>${escapeHtml(p.title)}</th>`).join('')}
    </tr>
  `;

  tbody.innerHTML = j.rows.map(row => {
    const cells = j.places.map(p => {
      const cell = row.cells[p.id];
      const status = cell?.status || 'free';
      const label = cell?.label || 'Свободно';

      let cls = 'free';
      if (status === 'busy') cls = 'busy';
      if (status === 'pending') cls = 'pending';

      let btn = '';
      if (status === 'free' && activeRequestId && activeRequestStatus === 'pending_supplier') {
        btn = `<button class="btn btn-primary btn-sm" onclick="confirmSlot('${row.time}', '${p.id}')">Выбрать</button>`;
      }

      return `
        <td class="${cls}">
          <div>${escapeHtml(label)}</div>
          ${btn}
        </td>
      `;
    }).join('');

    return `
      <tr>
        <td>${escapeHtml(row.time)}</td>
        ${cells}
      </tr>
    `;
  }).join('');
}

async function confirmSlot(time, place) {
  if (!activeRequestId) {
    alert('Сначала выберите заявку');
    return;
  }

  const date = document.getElementById('calendarDate').value;
  if (!date) {
    alert('Выберите дату');
    return;
  }

  const r = await fetch(`/api/supplier/requests/${activeRequestId}/confirm`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      delivery_date: date,
      delivery_time: time,
      unload_place: place
    })
  });

  const j = await r.json();
  if (j.success) {
    alert('Время подтверждено');
    activeRequestId = null;
    await loadRequests();
    await loadCalendar(date);
  } else {
    alert(j.error || 'Ошибка подтверждения');
  }
}

async function rescheduleRequest(reqId) {
  const r = await fetch(`/api/supplier/requests/${reqId}/reschedule`, {
    method: 'POST'
  });
  const j = await r.json();

  if (j.success) {
    alert('Запрос на перенос отправлен');
    await loadRequests();
  } else {
    alert(j.error || 'Ошибка');
  }
}

async function rejectRequest(reqId) {
  const ok = confirm('Отказаться от заявки?');
  if (!ok) return;

  const r = await fetch(`/api/supplier/requests/${reqId}/reject`, {
    method: 'POST'
  });
  const j = await r.json();

  if (j.success) {
    alert('Заявка отклонена');
    await loadRequests();
  } else {
    alert(j.error || 'Ошибка');
  }
}

document.getElementById('calendarDate').addEventListener('change', async (e) => {
  if (e.target.value) {
    await loadCalendar(e.target.value);
  }
});

loadRequests();
</script>
{% endblock %}
